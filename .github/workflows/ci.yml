name: CI

on:
  push:
    branches: [master, fix/review-issues]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests (if available)
        run: |
          if grep -q '"test"' package.json; then
            bun run test
          else
            echo "No test script defined, skipping tests."
          fi

      - name: Audit npm dependencies for CVEs
        run: bun audit --level high || true
